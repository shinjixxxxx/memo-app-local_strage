<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMO SAVE IN LOCALSTORAGE</title>
    <style>
        body{
            padding: 30px;
            background: #fafafa;
            /* iOSで明朝にならないようゴシック系を明示 */
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP", "Yu Gothic", "Meiryo", system-ui, sans-serif;
        }
        /* 入力欄・ボタンはフォントを継承しないため明示的に揃える
           （※フロートUI #page-switcher 配下は独自フォントのため除外）*/
        input:not(#page-switcher input),
        textarea,
        button:not(#page-switcher button) {
            font-family: inherit;
        }
        form {
            font-size: 18px;
            line-height: 1;
        }
        /* =========================================================
           メモ側（メイン画面）: チェック行・1行メモ・下部メモ
           ========================================================= */

        /* dynamic-rows は flex 縦積み（ドラッグ並び替え対応） */
        #dynamic-rows {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        /* 1行分（ドラッグハンドル + チェック群 + メモ入力 + 削除D）*/
        #dynamic-rows .row {
            display: flex;
            align-items: center;
            gap: 12px;
            border: #ccc 1px solid;
            padding: 4px;
            border-radius: 3px;
            background: #fff;
        }
        #dynamic-rows .row .left {
            white-space: nowrap;
            flex-shrink: 0;
            font-size: 0.9em;   /* 予定/作業/終了/確認 のラベルを微妙に小さく */
            color: #666;
        }
        /* チェックボックスのチェック色を yaml のティール accent に合わせる */
        input[type="checkbox"] {
            accent-color: rgb(0, 174, 174);
        }
        #dynamic-rows .row .right {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #dynamic-rows .row input[type="text"],
        #dynamic-rows .row input.memo {
            width: 100%;
            box-sizing: border-box;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* ドラッグハンドル */
        .drag-handle {
            cursor: grab;
            padding: 0 4px;
            color: #aaa;
            font-size: 1.2em;
            flex-shrink: 0;
            user-select: none;
        }
        .drag-handle:active { cursor: grabbing; }
        #dynamic-rows .row.dragging { opacity: 0.4; }  /* ドラッグ中の行を半透明に */

        /* 1行メモ（テキスト入力）*/
        input.memo {
            width: 100%;
            box-sizing: border-box;
            /* 縦幅を約20%増加させる（既定より広め） */
            padding: 10px;
            height: calc(1.2em * 1.2 + 14px);
            font-size: 1rem;
            border-radius: 4px;
            border: 1px solid rgba(0,174,174,0.5);
        }
        /* フォーカス時：枠線を濃く＋淡いグロー */
        input.memo:focus {
            outline: none;
            border-color: rgba(0,160,160,1);
            box-shadow: 0 0 0 3px rgba(0,196,196,0.28);
        }
        /* 1行メモは残り幅いっぱいに（右の opn ボタンと横並び）*/
        .rows .right input.memo {
            display: block;
            flex: 1;
            width: auto;
            min-width: 0;
        }
        /* メモ内URLを開く [opn] ボタン（URLがある行だけJSで表示）
           ティールナビ風: 暗いティールのフィル＋ホバーでaccent＋グロー */
        .memo-open {
            flex-shrink: 0;
            align-self: stretch;           /* 高さを隣の input.memo に揃える */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: 400;
            line-height: 1;
            padding: 0 12px;
            border: none;
            border-radius: 4px;
            background: darkcyan;   /* yaml の基調ティール（#008b8b）に合わせる */
            color: #ffffff;
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
            transition: background .3s, box-shadow .3s;
        }
        .memo-open:hover {
            background: rgba(0, 174, 174, 0.85);          /* yaml accent */
            box-shadow: 0 0 10px rgba(0, 196, 196, 0.4);  /* yaml glow */
        }
        textarea.memo {
            width: 100%;
            box-sizing: border-box;
            /* 上部メモを4行分表示するため最小高さを確保 */
            padding: 10px;
            min-height: calc(1.2em * 5 + 14px);
            font-size: 1rem;
            border-radius: 4px;
            border: 1px solid rgba(0,174,174,0.5);
            resize: vertical;
        }
        /* プレースホルダーを薄くする（textarea と input）
           透明度を約25%にして視認性を下げる */
        textarea::placeholder,
        input::placeholder {
            color: rgba(0,0,0,0.25);
        }
        /* クロスブラウザ対応（古いブラウザ用） */
        textarea::-webkit-input-placeholder, input::-webkit-input-placeholder { color: rgba(0,0,0,0.25); }
        textarea:-ms-input-placeholder, input:-ms-input-placeholder { color: rgba(0,0,0,0.25); }
        textarea.memo:focus {
            outline: none;
            border-color: rgba(0,160,160,1);
            box-shadow: 0 0 0 3px rgba(0,196,196,0.28);
        }
        /* ページ下部用の長文メモ（localStorageで保存される） */
        textarea.cocky {
            min-height: calc(1.2em * 8 + 14px);
            margin-top: 18px;
        }

        /* 行頭の削除ボタン [D]（クリックでその行を削除）*/
        .row-del-btn {
            flex-shrink: 0;
            align-self: stretch;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 400;
            padding: 0 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: #4d4d4d;
            background: #ddd;
            transition: background .2s, color .2s;
        }
        .row-del-btn:hover { color: #000; background: rgba(0,87,87,0.15); }

        /* 行を増減する ＋ / － ボタン */
        #btn-add-row, #btn-remove-row {
            font-size: 0.7em;
            font-weight: 400;
            line-height: 1;
            padding: 4px 8px;
            border: 1px solid #eee;
            border-radius: 3px;
            cursor: pointer;
            transition: background .2s;
        }
        #btn-add-row:hover, #btn-remove-row:hover { background: rgba(0,174,174,0.15); }

        /* スマホ対応 */
        @media (max-width: 640px) {
            body {
                padding: 3px;
            }
            form {
                font-size: 16px;
            }
            #dynamic-rows .row {
                flex-wrap: wrap;
                gap: 4px;
                padding: 6px;
            }
            .drag-handle {
                font-size: 1.4em;
                padding: 4px 5px;
                min-width: 18px;
                text-align: center;
                touch-action: none;
            }
            #dynamic-rows .row .left {
                flex: 1;
                min-width: 0;
                display: flex;
                align-items: center;
                flex-wrap: wrap;
                gap: 2px;
                white-space: normal;
            }
            #dynamic-rows .row .right {
                flex: 0 0 100%;
            }
            input[type="checkbox"] {
                width: 16px;
                height: 16px;
                margin: 0 1px;
            }
            input.memo {
                font-size: 16px; /* iOSズーム防止 */
                padding: 8px;
            }
            textarea.memo {
                font-size: 16px;
            }
        }

        /* ===== ページ下部タイトルバー [CLA] [日付] [タイトル] ===== */
        #page-title-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 18px;
        }
        #page-title-bar .ptb-field {
            box-sizing: border-box;
            padding: 10px;
            font-size: 1rem;
            font-family: inherit;
            border-radius: 4px;
            border: 1px solid rgba(0,174,174,0.5);
            background: #fff;
            color: #1a1a1a;
        }
        #page-title-bar #ptb-date {
            flex: 0 0 auto;
            width: 130px;
            text-align: center;
        }
        #page-title-bar #ptb-title {
            flex: 1;
            min-width: 0;
        }
        #page-title-bar #ptb-title:focus,
        #page-title-bar #ptb-date:focus {
            outline: none;
            border-color: rgba(0,160,160,1);
            box-shadow: 0 0 0 3px rgba(0,196,196,0.28);
        }
        #page-title-bar #ptb-clear {
            flex: 0 0 auto;
            padding: 10px 14px;
            border-radius: 4px;
            border: 1px solid rgba(0,174,174,0.5);
            background: #fff;
            color: darkcyan;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background .2s;
        }
        #page-title-bar #ptb-clear:hover { background: rgba(0,174,174,0.12); }

        /* ===== ページ切替フロートUI（i-elements ティールナビ風 / 画面右下）===== */
        /* 枠線なし・アクティブはティールのフィル＋グロー・font-weight 400 */
        #page-switcher {
            --font: "Roboto","Noto Sans JP",system-ui,-apple-system,"Segoe UI",Arial,"Hiragino Kaku Gothic ProN","Meiryo","Noto Sans CJK JP",sans-serif;
            --radius: 6px;
            --panel-bg: rgba(3, 50, 50, 0.8);
            --item-bg: rgba(0, 31, 31, 0.5);
            --accent: rgba(0, 174, 174, 0.3);   /* アクティブ/ホバーのフィル */
            --accent-strong: rgba(0, 196, 196, 0.2); /* グロー */
            --text: #00a7a7;
            --text-active: #ffffff;
            --handle: rgba(0, 209, 209, 0.6);

            position: fixed;
            right: 8px;
            bottom: 8px;
            z-index: 9999;
            box-sizing: border-box;

            display: flex;
            flex-direction: column;
            width: 150px;
            padding: 6px;
            background: var(--panel-bg);
            border-radius: var(--radius);
            box-shadow: 0 0 15px var(--accent-strong);
            backdrop-filter: blur(2px);
            font-family: var(--font);
            font-size: 12px;
            font-weight: 400;
            color: var(--text-active);
        }
        #page-switcher * { box-sizing: border-box; }

        /* 行リスト（下=base、上=新しいページ。配列を逆順描画）*/
        #page-switcher .ps-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        /* 各ページ行 [⠿] [name] [C][-]（枠なし・省スペース）*/
        #page-switcher .ps-row {
            display: flex;
            align-items: center;
            gap: 2px;
            transition: opacity .15s;
        }
        #page-switcher .ps-row.ps-dragging { opacity: .4; }

        /* ドラッグハンドル */
        #page-switcher .ps-handle {
            flex-shrink: 0;
            width: 16px;
            text-align: center;
            color: var(--handle);
            cursor: grab;
            user-select: none;
            font-size: 13px;
            line-height: 1;
            touch-action: none;
        }
        #page-switcher .ps-handle:active { cursor: grabbing; }

        /* ページ名 [name]（クリックで切替・枠なし。ダブルクリックで改名）*/
        #page-switcher .ps-name {
            flex: 1;
            min-width: 0;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 12px;
            font-weight: 400;
            color: var(--text);
            text-align: left;
            padding: 3px 6px;
            border-radius: 4px;
            cursor: pointer;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: background .3s, color .3s, box-shadow .3s;
        }
        #page-switcher .ps-name:hover { background: var(--accent); }
        /* アクティブ＝枠線ではなくティールのフィル＋グロー */
        #page-switcher .ps-row.active .ps-name {
            background: var(--accent);
            color: var(--text-active);
            box-shadow: 0 0 10px var(--accent-strong);
        }

        /* 改名用インライン入力 */
        #page-switcher .ps-name-input {
            flex: 1;
            min-width: 0;
            border: none;
            outline: none;
            background: var(--accent);
            color: var(--text-active);
            font-family: inherit;
            font-size: 12px;
            font-weight: 400;
            padding: 3px 6px;
            border-radius: 4px;
        }

        /* アクション群 [C][-]（枠線なし）*/
        #page-switcher .ps-actions {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
        }
        #page-switcher .ps-btn {
            border: none;
            width: 20px;
            height: 20px;
            padding: 0;
            line-height: 1;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--item-bg);
            color: var(--text);
            transition: background .3s;
        }
        #page-switcher .ps-btn:hover  { background: var(--accent); }
        #page-switcher .ps-btn:active { background: rgba(0, 174, 174, 0.45); }

        /* ===== 設定ダイアログ（ティール / フェードイン・アウト）===== */
        #ps-settings-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.45);
            opacity: 0;
            visibility: hidden;
            transition: opacity .25s ease, visibility .25s ease;
            font-family: "Roboto","Noto Sans JP",system-ui,-apple-system,"Segoe UI",Arial,"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;
        }
        #ps-settings-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        #ps-settings-overlay .ps-dialog {
            box-sizing: border-box;
            min-width: 280px;
            max-width: 90vw;
            padding: 18px;
            background: rgba(3, 50, 50, 0.95);
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(0, 196, 196, 0.2), 0 8px 24px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            color: #ffffff;
            font-size: 13px;
            font-weight: 400;
            transform: translateY(8px);
            transition: transform .25s ease;
        }
        #ps-settings-overlay.open .ps-dialog { transform: translateY(0); }
        #ps-settings-overlay .ps-dialog * { box-sizing: border-box; }
        #ps-settings-overlay .ps-dialog-title {
            font-size: 14px;
            color: darkcyan;
            margin-bottom: 14px;
            font-weight: 400;
        }
        #ps-settings-overlay .ps-field { display: block; margin-bottom: 16px; }
        #ps-settings-overlay .ps-field-label {
            display: block;
            font-size: 12px;
            color: darkcyan;
            margin-bottom: 6px;
        }
        #ps-settings-overlay .ps-field-input {
            width: 100%;
            border: none;
            outline: none;
            background: rgba(0, 31, 31, 0.6);
            color: #ffffff;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            font-weight: 400;
        }
        #ps-settings-overlay .ps-field-input:focus { box-shadow: 0 0 0 2px rgba(0, 196, 196, 0.4); }
        #ps-settings-overlay .ps-dialog-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        #ps-settings-overlay .ps-dialog-btn {
            border: none;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 4px;
            background: rgba(0, 31, 31, 0.6);
            color: darkcyan;
            font-family: inherit;
            font-size: 12px;
            font-weight: 400;
            transition: background .3s;
        }
        #ps-settings-overlay .ps-dialog-btn:hover { background: rgba(0, 174, 174, 0.3); }
        #ps-settings-overlay .ps-dialog-btn.primary { background: rgba(0, 174, 174, 0.35); color: #fff; }
        #ps-settings-overlay .ps-dialog-btn.primary:hover { background: rgba(0, 174, 174, 0.5); }

        /* ===== トグルスイッチ（自動同期ON/OFF）===== */
        .ps-toggle { display:flex; align-items:center; gap:8px; }
        .ps-toggle input[type="checkbox"] { display:none; }
        .ps-toggle-track {
            width:36px; height:20px; border-radius:10px;
            background:rgba(255,255,255,0.15);
            position:relative; cursor:pointer; flex-shrink:0;
            transition:background .2s;
        }
        .ps-toggle input:checked + .ps-toggle-track { background:rgba(0,174,174,0.7); }
        .ps-toggle-thumb {
            position:absolute; top:2px; left:2px;
            width:16px; height:16px; border-radius:50%;
            background:#fff; transition:left .2s;
        }
        .ps-toggle input:checked + .ps-toggle-track .ps-toggle-thumb { left:18px; }
        .ps-toggle-label { font-size:12px; color:rgba(255,255,255,0.8); }

        /* ===== カスタムツールチップ ===== */
        #tip {
            position: fixed;
            z-index: 99999;
            pointer-events: none;
            padding: 4px 8px;
            background: rgba(3, 50, 50, 0.92);
            color: darkcyan;
            font-family: "Roboto","Noto Sans JP",system-ui,-apple-system,sans-serif;
            font-size: 11px;
            font-weight: 400;
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(0,196,196,0.2);
            white-space: nowrap;
            opacity: 0;
            transition: opacity .15s;
            left: -9999px;
            top: -9999px;
        }
        #tip.visible { opacity: 1; }
    </style>
</head>
<body>
<form action="">
<!-- トップに追加: チェックボックス3つ + 1行メモ を10行（自動保存対応） -->
    <div id="dynamic-rows" class="rows" style="margin-bottom:12px;">
        <div class="row"><div class="left">予定<input type="checkbox" name="" id=""> 作業<input type="checkbox" name="" id=""> 終了<input type="checkbox" name="" id=""> 確認<input type="checkbox" name="" id=""></div><div class="right"><input type="text" class="memo" placeholder="メモ"></div></div>
        <div class="row"><div class="left">予定<input type="checkbox" name="" id=""> 作業<input type="checkbox" name="" id=""> 終了<input type="checkbox" name="" id=""> 確認<input type="checkbox" name="" id=""></div><div class="right"><input type="text" class="memo" placeholder="メモ"></div></div>
        <div class="row"><div class="left">予定<input type="checkbox" name="" id=""> 作業<input type="checkbox" name="" id=""> 終了<input type="checkbox" name="" id=""> 確認<input type="checkbox" name="" id=""></div><div class="right"><input type="text" class="memo" placeholder="メモ"></div></div>
        <div class="row"><div class="left">予定<input type="checkbox" name="" id=""> 作業<input type="checkbox" name="" id=""> 終了<input type="checkbox" name="" id=""> 確認<input type="checkbox" name="" id=""></div><div class="right"><input type="text" class="memo" placeholder="メモ"></div></div>
        <div class="row"><div class="left">予定<input type="checkbox" name="" id=""> 作業<input type="checkbox" name="" id=""> 終了<input type="checkbox" name="" id=""> 確認<input type="checkbox" name="" id=""></div><div class="right"><input type="text" class="memo" placeholder="メモ"></div></div>
        <div class="row"><div class="left">予定<input type="checkbox" name="" id=""> 作業<input type="checkbox" name="" id=""> 終了<input type="checkbox" name="" id=""> 確認<input type="checkbox" name="" id=""></div><div class="right"><input type="text" class="memo" placeholder="メモ"></div></div>
    </div>
    <div style="margin-bottom:12px;">
        <button id="btn-add-row">＋</button>
        <button id="btn-remove-row">－</button>
    </div>

    <textarea class="memo" placeholder="メモ１" rows="5"></textarea>
<textarea class="memo cocky" placeholder="メモ２" rows="8"></textarea>

<!-- ページ下部: クリア / 日付 / ページタイトル -->
<div id="page-title-bar">
    <button type="button" id="ptb-clear" data-tip="このページのメモ内容をクリア">CLA</button>
    <input type="text" id="ptb-date"  class="ptb-field" data-tip="日付">
    <input type="text" id="ptb-title" class="ptb-field" placeholder="ページタイトル">
</div>
</form>

<!-- ページ切替フロートUI（JSで描画） -->
<div id="page-switcher" aria-label="ページ切替"></div>

<!-- カスタムツールチップ -->
<div id="tip" aria-hidden="true"></div>

<!-- 設定ダイアログ -->
<div id="ps-settings-overlay" aria-hidden="true">
    <div class="ps-dialog" role="dialog" aria-modal="true" aria-label="設定">
        <div class="ps-dialog-title">設定</div>
        <label class="ps-field">
            <span class="ps-field-label">ページタイトル</span>
            <input type="text" id="ps-page-title" class="ps-field-input" placeholder="ページタイトル">
        </label>
        <label class="ps-field">
            <span class="ps-field-label">この端末の名前</span>
            <input type="text" id="ps-device-name" class="ps-field-input" placeholder="例: メインMac">
        </label>
        <div class="ps-field">
            <span class="ps-field-label">自動同期</span>
            <label class="ps-toggle">
                <input type="checkbox" id="ps-auto-sync-enabled">
                <span class="ps-toggle-track"><span class="ps-toggle-thumb"></span></span>
                <span class="ps-toggle-label">有効</span>
            </label>
        </div>
        <label class="ps-field">
            <span class="ps-field-label">自動同期の間隔（分）</span>
            <input type="number" id="ps-sync-interval" class="ps-field-input" min="1" step="1" placeholder="30">
        </label>
        <div class="ps-field">
            <span class="ps-field-label">同期</span>
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                <button type="button" id="ps-sync-now" class="ps-dialog-btn primary">同期する</button>
                <button type="button" id="ps-merge-read" class="ps-dialog-btn">マージ読込</button>
                <button type="button" id="ps-pick-file" class="ps-dialog-btn" style="display:none;">別のファイルを選んで同期</button>
            </div>
            <div style="margin-top:6px; font-size:10px; color:rgba(255,255,255,0.55); line-height:1.5;">

<!-- ===== 同期用の純粋関数（DOM/localStorage非依存・Nodeで単体テスト可能）===== -->
<script>
window.MemoSync = (function () {
    'use strict';

    // 文字列を行に分割し、空行を除いて重複なしの和集合を作る（a の順を優先）
    function unionLines(a, b) {
        const out = [], seen = new Set();
        const push = s => {
            (s == null ? '' : String(s)).split('\n').forEach(line => {
                const t = line.replace(/\s+$/, '');   // 末尾空白のみ除去
                const key = t.trim();
                if (key === '' || seen.has(key)) return;
                seen.add(key); out.push(t);
            });
        };
        push(a); push(b);
        return out.join('\n');
    }

    // 配列を4個ずつ（チェックボックス1行=4個）に分割
    function chunk4(arr) {
        const out = [];
        for (let i = 0; i < arr.length; i += 4) {
            out.push([arr[i], arr[i + 1], arr[i + 2], arr[i + 3]].map(Boolean));
        }
        return out;
    }

    // ページの raw(memos/checks/rows) を「行データ」と「末尾textarea(メモ1/メモ2)」に分解
    function splitPage(page) {
        const rows   = Math.max(0, parseInt(page.rows, 10) || 0);
        const memos  = Array.isArray(page.memos)  ? page.memos  : [];
        const checks = Array.isArray(page.checks) ? page.checks : [];
        const rowMemos  = memos.slice(0, rows);
        const extras    = memos.slice(rows);                 // [メモ1, メモ2]
        const rowChecks = chunk4(checks.slice(0, rows * 4));
        const rowsArr = [];
        for (let i = 0; i < rows; i++) {
            rowsArr.push({
                memo: rowMemos[i] != null ? rowMemos[i] : '',
                checks: rowChecks[i] || [false, false, false, false]
            });
        }
        return { rowsArr, extras };
    }

    function orChecks(a, b) {
        const out = [];
        for (let i = 0; i < 4; i++) out.push(Boolean((a && a[i]) || (b && b[i])));
        return out;
    }

    // yyyy-mm-dd は辞書順=日付順。新しい方（無ければ有る方）を採用
    function pickDate(a, b) {
        a = a || ''; b = b || '';
        if (!a) return b; if (!b) return a;
        return a >= b ? a : b;
    }

    function normalizePage(p) {
        return {
            id: p.id, name: p.name || '', origin: p.origin || '',
            rows: parseInt(p.rows, 10) || (Array.isArray(p.memos) ? p.memos.length : 0),
            date: p.date || '',
            memos:  Array.isArray(p.memos)  ? p.memos.slice()  : [],
            checks: Array.isArray(p.checks) ? p.checks.slice() : []
        };
    }

    // 同一IDの2ページをマージ：行=メモ文字列の和集合（全部残す・重複排除・チェックは論理和）、
    // textarea(メモ1/メモ2)=行の和集合、date=新しい方
    function mergePage(localP, remoteP) {
        const L = splitPage(localP), R = splitPage(remoteP);
        const map = new Map(), order = [];
        const add = row => {
            const key = (row.memo || '').trim();
            if (key === '') return;                  // 空メモ行は蓄積しない
            if (map.has(key)) {
                const ex = map.get(key);
                ex.checks = orChecks(ex.checks, row.checks);
            } else {
                map.set(key, { memo: row.memo, checks: row.checks.slice() });
                order.push(key);
            }
        };
        L.rowsArr.forEach(add);
        R.rowsArr.forEach(add);
        const merged = order.map(k => map.get(k));

        // 行数 = 非空マージ結果と元の行数の最大。足りない分は空行で埋める（行が増える方向）
        const baseRows = Math.max(merged.length, parseInt(localP.rows, 10) || 0, parseInt(remoteP.rows, 10) || 0);
        const rowMemos = [], rowChecks = [];
        for (let i = 0; i < baseRows; i++) {
            if (i < merged.length) { rowMemos.push(merged[i].memo); rowChecks.push(merged[i].checks); }
            else { rowMemos.push(''); rowChecks.push([false, false, false, false]); }
        }

        // 末尾 textarea（メモ1/メモ2）を行和集合でマージ
        const extraCount = Math.max(L.extras.length, R.extras.length);
        const extras = [];
        for (let i = 0; i < extraCount; i++) extras.push(unionLines(L.extras[i] || '', R.extras[i] || ''));

        const memos = rowMemos.concat(extras);
        const checks = [];
        rowChecks.forEach(c => checks.push(c[0], c[1], c[2], c[3]));

        return {
            id: localP.id,
            name: localP.name || remoteP.name || '',
            origin: localP.origin || remoteP.origin || '',
            rows: baseRows,
            date: pickDate(localP.date, remoteP.date),
            memos: memos,
            checks: checks
        };
    }

    // ドキュメント全体のマージ：ページはID基準で全部残す（両方にあればmergePage）
    function mergeDocs(localDoc, remoteDoc) {
        const lPages = (localDoc && localDoc.pages) || [];
        const rPages = (remoteDoc && remoteDoc.pages) || [];
        const rById = new Map(rPages.map(p => [p.id, p]));
        const lIds  = new Set(lPages.map(p => p.id));
        const out = [];
        lPages.forEach(lp => {
            const rp = rById.get(lp.id);
            out.push(rp ? mergePage(lp, rp) : normalizePage(lp));
        });
        rPages.forEach(rp => { if (!lIds.has(rp.id)) out.push(normalizePage(rp)); });
        return {
            schema: 1,
            device: (localDoc && localDoc.device) || (remoteDoc && remoteDoc.device) || null,
            title:  (localDoc && localDoc.title)  || (remoteDoc && remoteDoc.title)  || '',
            pages: out
        };
    }

    return { unionLines, chunk4, splitPage, orChecks, pickDate, normalizePage, mergePage, mergeDocs };
})();
</script>

<script>
document.addEventListener('DOMContentLoaded', function(){
    const form = document.querySelector('form');
    if (!form) return;

    const dynamicRows = document.getElementById('dynamic-rows');
    const switcher    = document.getElementById('page-switcher');
    const DEFAULT_ROW_COUNT = 6;

    // ===== ページ単位 localStorage =====
    const K_PAGES  = 'fs02_pages';   // [{id, name}]（先頭が base）
    const K_ACTIVE = 'fs02_active';  // アクティブページ id
    const pk = (id, suf) => 'fs02_' + id + '_' + suf; // ページ別キー

    function parseJSON(raw, fb) {
        try { return raw ? JSON.parse(raw) : fb; } catch(e) { return fb; }
    }

    function todayStr() {
        const d = new Date(), p = n => String(n).padStart(2,'0');
        return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate());
    }

    function refreshTitleBar(id) {
        const titleEl = document.getElementById('ptb-title');
        const dateEl  = document.getElementById('ptb-date');
        if (!titleEl || !dateEl) return;
        const p = getPages().find(x => x.id === id);
        titleEl.value = p ? p.name : '';
        let dt = localStorage.getItem(pk(id,'date'));
        if (!dt) { dt = todayStr(); localStorage.setItem(pk(id,'date'), dt); }
        dateEl.value = dt;
    }

    function getPages()  { return parseJSON(localStorage.getItem(K_PAGES), null); }
    function setPages(a) { localStorage.setItem(K_PAGES, JSON.stringify(a)); }
    function getActive() { return localStorage.getItem(K_ACTIVE); }
    function setActive(id){ localStorage.setItem(K_ACTIVE, id); }

    // ===== 端末ID・端末名（ID衝突防止＋ページ由来追跡）=====
    const K_DEVICE = 'fs02_device';   // {id, name}
    function guessDeviceName() {
        const ua = navigator.userAgent || '';
        // iPadOS Safari は Macintosh を名乗るのでタッチ有無で判定
        if (/iPad/.test(ua) || (/Macintosh/.test(ua) && (navigator.maxTouchPoints || 0) > 1)) return 'iPad';
        if (/iPhone/.test(ua)) return 'iPhone';
        if (/Macintosh|Mac OS X/.test(ua)) return 'Mac';
        if (/Android/.test(ua)) return 'Android';
        if (/Windows/.test(ua)) return 'Windows';
        return 'その他';
    }
    function genUuid() {
        if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
        return 'x-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
    }
    function getDevice() {
        let d = parseJSON(localStorage.getItem(K_DEVICE), null);
        if (!d || !d.id) {
            d = { id: genUuid(), name: guessDeviceName() };
            localStorage.setItem(K_DEVICE, JSON.stringify(d));
        }
        return d;
    }
    function setDeviceName(name) {
        const d = getDevice();
        d.name = (name && name.trim()) || d.name;
        localStorage.setItem(K_DEVICE, JSON.stringify(d));
    }

    // ===== シリアライズ（localStorage 全体 ⇄ 正規化JSONドキュメント）=====
    function exportData() {
        const pages = getPages() || [];
        return {
            schema: 1,
            device: getDevice(),
            title: localStorage.getItem('fs02_title') || document.title || '',
            pages: pages.map(p => ({
                id: p.id,
                name: p.name || '',
                origin: p.origin || '',
                rows: parseInt(localStorage.getItem(pk(p.id, 'rows')), 10) || DEFAULT_ROW_COUNT,
                date: localStorage.getItem(pk(p.id, 'date')) || '',
                memos:  parseJSON(localStorage.getItem(pk(p.id, 'memo')), []),
                checks: parseJSON(localStorage.getItem(pk(p.id, 'cb')),   [])
            }))
        };
    }

    // doc を localStorage に書き込み、画面を再描画（置換）。マージ済みdocを渡す前提
    // replace=true（強制読込）のときは現在画面の保存を行わず、doc で完全置換する
    function applyDoc(doc, replace) {
        if (!doc || !Array.isArray(doc.pages) || !doc.pages.length) return;
        if (!replace) savePage(getActive());   // 取りこぼし防止（マージ時のみ）
        doc.pages.forEach(p => {
            localStorage.setItem(pk(p.id, 'rows'), parseInt(p.rows, 10) || DEFAULT_ROW_COUNT);
            localStorage.setItem(pk(p.id, 'memo'), JSON.stringify(Array.isArray(p.memos)  ? p.memos  : []));
            localStorage.setItem(pk(p.id, 'cb'),   JSON.stringify(Array.isArray(p.checks) ? p.checks : []));
            if (p.date) localStorage.setItem(pk(p.id, 'date'), p.date);
        });
        if (doc.title) { localStorage.setItem('fs02_title', doc.title); applyTitle(doc.title); }
        const pages = doc.pages.map(p => ({ id: p.id, name: p.name || '', origin: p.origin || '' }));
        setPages(pages);
        if (!pages.some(x => x.id === getActive())) setActive(pages[0].id);
        loadPage(getActive());
        renderSwitcher();
    }

    // 取り込み = 現在のローカルと常にマージ（和集合・全部残す）。マージ結果を返す
    function importDocMerge(remoteDoc) {
        savePage(getActive());
        const merged = MemoSync.mergeDocs(exportData(), remoteDoc);
        applyDoc(merged);
        return merged;
    }

    // ===== 同期I/O（端末別の読み書き）=====
    // Mac(Chrome/Edge): File System Access API で同一ファイルに上書き
    // iPad/iPhone(Safari): input で読込 → ダウンロードで書き出し
    const canFSA = (typeof window.showOpenFilePicker === 'function' &&
                    typeof window.showSaveFilePicker === 'function');
    const SYNC_FILENAME = 'm.json';
    let fsHandle = null;   // 指定したファイルハンドル（IndexedDBで永続化）

    // --- IndexedDB（FileSystemFileHandle をリロードをまたいで保持）---
    function idbOpen() {
        return new Promise((res, rej) => {
            const r = indexedDB.open('memo-sync', 1);
            r.onupgradeneeded = () => r.result.createObjectStore('kv');
            r.onsuccess = () => res(r.result);
            r.onerror = () => rej(r.error);
        });
    }
    async function idbSet(k, v) {
        const db = await idbOpen();
        return new Promise((res, rej) => {
            const tx = db.transaction('kv', 'readwrite');
            tx.objectStore('kv').put(v, k);
            tx.oncomplete = () => res();
            tx.onerror = () => rej(tx.error);
        });
    }
    async function idbGet(k) {
        const db = await idbOpen();
        return new Promise((res, rej) => {
            const tx = db.transaction('kv', 'readonly');
            const rq = tx.objectStore('kv').get(k);
            rq.onsuccess = () => res(rq.result);
            rq.onerror = () => rej(rq.error);
        });
    }

    async function restoreHandle() {
        if (!canFSA) return null;
        try { const h = await idbGet('fileHandle'); if (h) fsHandle = h; } catch (e) {}
        return fsHandle;
    }
    async function ensurePermission(handle, mode) {
        mode = mode || 'readwrite';
        if (!handle || !handle.queryPermission) return true;
        const opts = { mode };
        if ((await handle.queryPermission(opts)) === 'granted') return true;
        if ((await handle.requestPermission(opts)) === 'granted') return true;
        return false;
    }
    const JSON_TYPES = [{ description: 'JSON', accept: { 'application/json': ['.json'] } }];
    // 既存の同期ファイルを「開く」（iCloud上の memo-sync を選ぶ。読み書き許可も取得）
    async function openExistingFile() {
        const [h] = await window.showOpenFilePicker({ types: JSON_TYPES, multiple: false });
        fsHandle = h;
        if (h.requestPermission) { try { await h.requestPermission({ mode: 'readwrite' }); } catch (e) {} }
        await idbSet('fileHandle', fsHandle);
        return fsHandle;
    }
    // 新規に同期ファイルを作成（まだファイルが無い最初の端末用）
    async function createNewFile() {
        fsHandle = await window.showSaveFilePicker({ suggestedName: SYNC_FILENAME, types: JSON_TYPES });
        await idbSet('fileHandle', fsHandle);
        return fsHandle;
    }
    // ファイル未指定時：既存を開く。キャンセルされたら新規作成を提案
    async function ensureHandle() {
        if (fsHandle) return fsHandle;
        try { return await openExistingFile(); }
        catch (e) {
            if (confirm('同期ファイルが見つかりません。新規に作成しますか？\n（最初の1台目はこちら）')) {
                return await createNewFile();
            }
            throw e;
        }
    }
    async function readHandle(handle) {
        const file = await handle.getFile();
        const text = await file.text();
        return text ? JSON.parse(text) : null;
    }
    async function writeHandle(handle, doc) {
        const w = await handle.createWritable();
        await w.write(JSON.stringify(doc, null, 2));
        await w.close();
    }

    // 日時スタンプ付きファイル名を生成する（例: m-2026-06-08_14-30.json）
    function stampedFilename() {
        const d = new Date(), p = n => String(n).padStart(2, '0');
        const stamp = d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate())
                    + '_' + p(d.getHours()) + '-' + p(d.getMinutes());
        return 'm-' + stamp + '.json';
    }

    // 日時スタンプ付きファイル名で新規保存し、fsHandle を更新する
    async function writeSaveNew(doc) {
        const newHandle = await window.showSaveFilePicker({ suggestedName: stampedFilename(), types: JSON_TYPES });
        await writeHandle(newHandle, doc);
        fsHandle = newHandle;
        await idbSet('fileHandle', fsHandle);
    }

    // Mac 経路：（必要ならファイル選択）読み込み→マージ→反映→日時付きで新規保存
    // 戻り値: 取り込んだremoteのページ数（無ければ0）
    async function syncViaFSA() {
        await ensureHandle();                            // 既存を開く（無ければ新規作成）
        if (!(await ensurePermission(fsHandle))) throw new Error('ファイルへのアクセスが許可されませんでした');
        let remote = null;
        try { remote = await readHandle(fsHandle); } catch (e) { remote = null; }  // 空/新規は無視
        if (remote) importDocMerge(remote); else savePage(getActive());
        await writeSaveNew(exportData());
        markSynced();
        return remote && Array.isArray(remote.pages) ? remote.pages.length : 0;
    }

    // iPad/iPhone 経路：input で読込 → ダウンロードで書き出し
    function readViaInput() {
        return new Promise(resolve => {
            const inp = document.createElement('input');
            inp.type = 'file';
            inp.accept = '.json,application/json';
            inp.addEventListener('change', async () => {
                const f = inp.files && inp.files[0];
                if (!f) { resolve(null); return; }
                try { const t = await f.text(); resolve(t ? JSON.parse(t) : null); }
                catch (e) { alert('ファイルを読み込めませんでした'); resolve(null); }
            });
            inp.click();
        });
    }
    // ファイルとして書き出す。
    // iPhone/iPad(Safari): Web Share API の共有ダイアログから「ファイルに保存」を選ぶと
    //   iCloud Drive の任意フォルダに保存先を指定できる。
    // 非対応環境: 従来の <a download>（ブラウザ既定のダウンロードフォルダ）にフォールバック。
    async function downloadDoc(doc) {
        const name = stampedFilename();
        const json = JSON.stringify(doc, null, 2);
        // 共有ダイアログ経由（保存先を選べる）
        try {
            const file = new File([json], name, { type: 'application/json' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: name });
                return;
            }
        } catch (e) {
            if (e && e.name === 'AbortError') return;   // ユーザーがキャンセル：何もしない
            // それ以外（共有失敗）は下のダウンロードにフォールバック
        }
        // フォールバック：通常ダウンロード
        const blob = new Blob([json], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }
    async function syncViaDownload() {
        const remote = await readViaInput();
        if (remote) importDocMerge(remote); else savePage(getActive());
        await downloadDoc(exportData());
        markSynced();
        return remote && Array.isArray(remote.pages) ? remote.pages.length : 0;
    }

    // 公開: 同期する（端末に応じて経路選択）
    async function syncNow() {
        return canFSA ? syncViaFSA() : syncViaDownload();
    }

    // 強制書出：この端末の内容でファイルを上書き（読込・マージなし）
    // → 削除をファイルに反映したい時に使う。ファイル側の未取り込み分は消える
    async function forceWrite() {
        savePage(getActive());
        if (canFSA) {
            await writeSaveNew(exportData());
        } else {
            await downloadDoc(exportData());
        }
        markSynced();
    }

    // 強制読込：ファイルの内容でこの端末を上書き（マージなし・置換）
    // → ファイルを正として丸ごと採用。この端末だけにあるメモは消える
    async function forceRead() {
        let remote = null;
        if (canFSA) {
            await openExistingFile();   // 強制読込は毎回ファイルを選ばせる（どれを正にするか明示）
            if (!(await ensurePermission(fsHandle))) throw new Error('ファイルへのアクセスが許可されませんでした');
            remote = await readHandle(fsHandle);
        } else {
            remote = await readViaInput();
        }
        if (!remote || !Array.isArray(remote.pages) || !remote.pages.length) {
            throw new Error('読み込めるデータがありませんでした');
        }
        // 置換前のローカルページIDを控え、ファイルに無いページの孤立キーを掃除
        const oldIds = (getPages() || []).map(p => p.id);
        const newIds = new Set(remote.pages.map(p => p.id));
        applyDoc(remote, true);   // マージせず完全置換（現在画面の保存をスキップ）
        oldIds.forEach(id => {
            if (!newIds.has(id)) ['cb', 'memo', 'rows', 'date'].forEach(s => localStorage.removeItem(pk(id, s)));
        });
        markSynced();
        return remote.pages.length;
    }

    // 強制マージ読込：ファイルを選んで読み込み、この端末とマージ（書き出しはしない）
    // → 両方のメモを残す（和集合）。同期と違いファイルへ書き戻さない一方向の取り込み
    async function forceMergeRead() {
        let remote = null;
        if (canFSA) {
            await openExistingFile();   // 毎回ファイルを選ばせる
            if (!(await ensurePermission(fsHandle))) throw new Error('ファイルへのアクセスが許可されませんでした');
            remote = await readHandle(fsHandle);
        } else {
            remote = await readViaInput();
        }
        if (!remote || !Array.isArray(remote.pages) || !remote.pages.length) {
            throw new Error('読み込めるデータがありませんでした');
        }
        importDocMerge(remote);   // 端末とマージ（和集合・全部残す）
        markSynced();
        return remote.pages.length;
    }

    // ===== 未同期フラグ・同期状態・自動同期タイマー =====
    const K_DIRTY    = 'fs02_dirty';
    const K_LASTSYNC = 'fs02_lastsync';
    const K_INTERVAL   = 'fs02_sync_interval_min';
    const K_AUTO_SYNC  = 'fs02_auto_sync_enabled';
    function isAutoSyncEnabled() { return localStorage.getItem(K_AUTO_SYNC) === '1'; }
    function isDirty()      { return localStorage.getItem(K_DIRTY) === '1'; }
    function markDirty()    { localStorage.setItem(K_DIRTY, '1'); updateSyncStatus(); }
    function markSynced()   { localStorage.setItem(K_DIRTY, ''); localStorage.setItem(K_LASTSYNC, new Date().toISOString()); updateSyncStatus(); }
    function syncConfigured(){ return !!localStorage.getItem(K_LASTSYNC) || !!fsHandle; }
    function getIntervalMin(){ const n = parseInt(localStorage.getItem(K_INTERVAL), 10); return (n && n > 0) ? n : 30; }
    function relTime(iso) {
        if (!iso) return null;
        const t = Date.parse(iso); if (isNaN(t)) return null;
        const sec = Math.max(0, Math.floor((Date.now() - t) / 1000));
        if (sec < 60) return sec + '秒前';
        const min = Math.floor(sec / 60); if (min < 60) return min + '分前';
        const hr  = Math.floor(min / 60); if (hr  < 24) return hr  + '時間前';
        return Math.floor(hr / 24) + '日前';
    }
    function updateSyncStatus() {
        const el = document.getElementById('ps-sync-status');
        if (!el) return;
        const rel = relTime(localStorage.getItem(K_LASTSYNC));
        let s = rel ? ('最終同期: ' + rel) : '未同期';
        if (isDirty()) s += '（未保存の変更あり）';
        el.textContent = s;
    }

    let syncTimer = null;
    function armSyncTimer() {
        if (syncTimer) { clearInterval(syncTimer); syncTimer = null; }
        if (!canFSA) return;                         // 自動同期は直接上書きできるMacのみ
        if (!isAutoSyncEnabled()) return;            // スイッチOFFなら起動しない
        syncTimer = setInterval(async () => {
            if (!navigator.onLine || !fsHandle) return;
            try {
                // 無操作で許可が得られる場合のみ自動同期（権限プロンプトは出さない）
                if (!handlePermittedSilently) { return; }
                await syncViaFSA();
            } catch (e) { /* 自動同期の失敗は次回に委ねる */ }
        }, getIntervalMin() * 60 * 1000);
    }
    // queryPermission==='granted' のときだけ true（自動同期で勝手にプロンプトを出さないため）
    let handlePermittedSilently = false;
    async function refreshSilentPermission() {
        handlePermittedSilently = false;
        if (canFSA && fsHandle && fsHandle.queryPermission) {
            try { handlePermittedSilently = (await fsHandle.queryPermission({ mode: 'readwrite' })) === 'granted'; }
            catch (e) {}
        }
    }

    // 初回起動 / 旧データ移行（旧 free_sheet_02_* を base ページへ）
    function initPages() {
        let pages = getPages();
        if (!pages || !pages.length) {
            const oldCb   = localStorage.getItem('free_sheet_02_checkboxes');
            const oldMemo = localStorage.getItem('free_sheet_02_memos');
            const oldRows = localStorage.getItem('free_sheet_02_rows');
            if (oldCb   !== null) localStorage.setItem(pk('base','cb'),   oldCb);
            if (oldMemo !== null) localStorage.setItem(pk('base','memo'), oldMemo);
            if (oldRows !== null) localStorage.setItem(pk('base','rows'), oldRows);
            pages = [{ id:'base', name:'mem' }];
            setPages(pages);
            setActive('base');
        }
        if (!getActive() || !pages.some(p => p.id === getActive())) {
            setActive(pages[0].id);
        }
    }

    function newId() {
        // 端末IDのプレフィックス + UUID で、別端末との衝突を原理的に防ぐ
        return 'p_' + getDevice().id.slice(0, 8) + '_' + genUuid();
    }
    // 既存の "mem NN" の最大番号+1 で新名を生成
    function nextPageName(pages) {
        let max = 0;
        pages.forEach(p => {
            const m = /(\d+)\s*$/.exec(p.name || '');
            if (m) max = Math.max(max, parseInt(m[1], 10));
        });
        return 'mem ' + String(max + 1).padStart(2, '0');
    }

    // ===== 保存・復元（アクティブページ対象）=====
    function savePage(id) {
        if (!id) return;
        const cbs   = Array.from(form.querySelectorAll('input[type="checkbox"]'));
        const memos = Array.from(form.querySelectorAll('.memo'));
        const rows  = dynamicRows.querySelectorAll('.row').length;
        localStorage.setItem(pk(id,'cb'),   JSON.stringify(cbs.map(cb => cb.checked)));
        localStorage.setItem(pk(id,'memo'), JSON.stringify(memos.map(m => m.value)));
        localStorage.setItem(pk(id,'rows'), rows);
    }
    // 既存呼び出し（行追加/削除・ドラッグ・入力）との互換ラッパ
    function saveAll() { savePage(getActive()); markDirty(); }

    function loadPage(id) {
        let rowCount = parseInt(localStorage.getItem(pk(id,'rows')), 10);
        if (isNaN(rowCount)) rowCount = DEFAULT_ROW_COUNT;

        // dynamic-rows を再構築
        dynamicRows.innerHTML = '';
        for (let i = 0; i < rowCount; i++) {
            const r = createRow();
            dynamicRows.appendChild(r);
            bindRow(r);
        }

        // 一旦すべて初期化してから復元（前ページの値の残留を防ぐ）
        const cbs   = Array.from(form.querySelectorAll('input[type="checkbox"]'));
        const memos = Array.from(form.querySelectorAll('.memo'));
        cbs.forEach(cb => cb.checked = false);
        memos.forEach(m => m.value = '');

        const cbStates   = parseJSON(localStorage.getItem(pk(id,'cb')),   []);
        const memoStates = parseJSON(localStorage.getItem(pk(id,'memo')), []);
        cbs.forEach((cb, i)  => { if (typeof cbStates[i]   !== 'undefined') cb.checked = !!cbStates[i]; });
        memos.forEach((m, i) => { if (typeof memoStates[i] !== 'undefined') m.value    = memoStates[i]; });
        // 復元した値に応じて各行の opn ボタンを再表示
        dynamicRows.querySelectorAll('.right .memo').forEach(m => syncOpenBtn(m));
        refreshTitleBar(id);
    }

    // ===== ページ操作 =====
    function switchPage(id) {
        if (id === getActive()) return;
        savePage(getActive());
        setActive(id);
        loadPage(id);
        renderSwitcher();
    }

    // copyFromId を渡すとそのページを複製、null なら空ページを追加
    function addPage(copyFromId) {
        savePage(getActive());
        const pages = getPages();
        const id = newId();
        const name = nextPageName(pages);
        if (copyFromId) {
            ['cb','memo','rows','date'].forEach(suf => {
                const v = localStorage.getItem(pk(copyFromId, suf));
                if (v !== null) localStorage.setItem(pk(id, suf), v);
            });
        } else {
            localStorage.setItem(pk(id,'rows'), DEFAULT_ROW_COUNT);
            localStorage.removeItem(pk(id,'cb'));
            localStorage.removeItem(pk(id,'memo'));
        }
        pages.push({ id, name, origin: getDevice().id });
        setPages(pages);
        setActive(id);
        loadPage(id);
        renderSwitcher();
    }

    function deletePage(id) {
        const pages = getPages();
        const page = pages.find(p => p.id === id);
        if (!page) return;
        if (!confirm('ページ「' + page.name + '」を削除しますか？\nこの操作は元に戻せません。')) return;
        ['cb','memo','rows','date'].forEach(suf => localStorage.removeItem(pk(id, suf)));
        const remaining = pages.filter(p => p.id !== id);
        setPages(remaining);
        if (getActive() === id) {
            const next = remaining[0].id;
            setActive(next);
            loadPage(next);
        }
        renderSwitcher();
    }

    // ===== フロートUI描画 =====
    function renderSwitcher() {
        const pages   = getPages();
        const active  = getActive();
        const baseId  = pages.length ? pages[0].id : null;
        switcher.innerHTML = '';

        const list = document.createElement('div');
        list.className = 'ps-list';
        switcher.appendChild(list);

        // 上=新しいページ・下=base となるよう配列を逆順で描画
        pages.slice().reverse().forEach((p) => {
            const isBase = (p.id === baseId);
            const row = document.createElement('div');
            row.className = 'ps-row' + (p.id === active ? ' active' : '');
            row.dataset.pageId = p.id;
            if (!isBase) {
                row.draggable = true;
                row.dataset.pageDraggable = '1';
            }

            // 左端：base はハンバーガー（設定）、追加ページはドラッグハンドル
            if (isBase) {
                const menu = document.createElement('button');
                menu.type = 'button';
                menu.className = 'ps-btn ps-menu';
                menu.textContent = '☰';
                menu.addEventListener('click', openSettings);
                row.appendChild(menu);
            } else {
                const handle = document.createElement('span');
                handle.className = 'ps-handle';
                handle.textContent = '⠿';
                row.appendChild(handle);
            }

            // ページ名（クリックで切替・ダブルクリックで改名）
            const name = document.createElement('button');
            name.type = 'button';
            name.className = 'ps-name';
            name.textContent = p.name;
            name.dataset.tip = (localStorage.getItem(pk(p.id, 'date')) || '') + ':' + p.name;
            name.addEventListener('click', () => switchPage(p.id));
            name.addEventListener('dblclick', (e) => { e.preventDefault(); beginRename(p.id); });
            row.appendChild(name);

            // アクション [C][+ または -]
            const actions = document.createElement('div');
            actions.className = 'ps-actions';

            const copy = document.createElement('button');
            copy.type = 'button';
            copy.className = 'ps-btn ps-copy';
            copy.textContent = 'C';
            copy.addEventListener('click', () => addPage(p.id));
            actions.appendChild(copy);

            const last = document.createElement('button');
            last.type = 'button';
            if (isBase) {
                last.className = 'ps-btn ps-add';
                last.textContent = '+';
                last.addEventListener('click', () => addPage(null));
            } else {
                last.className = 'ps-btn ps-del';
                last.textContent = '−';
                last.addEventListener('click', () => deletePage(p.id));
            }
            actions.appendChild(last);

            row.appendChild(actions);

            list.appendChild(row);
        });
    }

    // ページ名のインライン改名（ダブルクリック）
    function beginRename(pageId) {
        const row = switcher.querySelector('.ps-row[data-page-id="' + pageId + '"]');
        if (!row || row.querySelector('.ps-name-input')) return;
        const nameEl = row.querySelector('.ps-name');
        if (!nameEl) return;
        const p = getPages().find(x => x.id === pageId);
        if (!p) return;

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'ps-name-input';
        input.value = p.name;
        nameEl.replaceWith(input);
        input.focus();
        input.select();

        let done = false;
        const commit = (save) => {
            if (done) return;
            done = true;
            if (save) {
                const v = input.value.trim();
                if (v) {
                    const list = getPages();
                    const t = list.find(x => x.id === pageId);
                    if (t) { t.name = v; setPages(list); }
                }
            }
            renderSwitcher();
        };
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter')      { e.preventDefault(); commit(true);  }
            else if (e.key === 'Escape'){ e.preventDefault(); commit(false); }
        });
        input.addEventListener('blur', () => commit(true));
    }

    // ===== ページ並び替え（追加ページのみ。baseは下端固定）=====
    function persistPageOrder() {
        const list = switcher.querySelector('.ps-list');
        if (!list) return;
        // DOM は上→下 = 新→旧。配列は逆順（base先頭）に戻す
        const domIds = Array.from(list.children).map(r => r.dataset.pageId);
        const orderIds = domIds.slice().reverse();
        const pages = getPages();
        const byId = {};
        pages.forEach(p => { byId[p.id] = p; });
        const next = orderIds.map(id => byId[id]).filter(Boolean);
        // base が先頭である保証（念のため）
        if (next.length && pages.length && next[0].id !== pages[0].id) {
            const baseIdx = next.findIndex(p => p.id === pages[0].id);
            if (baseIdx > 0) {
                const [base] = next.splice(baseIdx, 1);
                next.unshift(base);
            }
        }
        setPages(next);
    }

    function initPanelDragSort(container) {
        let dragging = null;
        const getList = () => container.querySelector('.ps-list');

        // PC: mouse drag
        container.addEventListener('dragstart', e => {
            const row = e.target.closest('.ps-row');
            if (!row || row.dataset.pageDraggable !== '1') return;
            dragging = row;
            e.dataTransfer.effectAllowed = 'move';
            setTimeout(() => row.classList.add('ps-dragging'), 0);
        });
        container.addEventListener('dragend', () => {
            if (!dragging) return;
            dragging.classList.remove('ps-dragging');
            dragging = null;
            persistPageOrder();
            renderSwitcher();
        });
        container.addEventListener('dragover', e => {
            if (!dragging) return;
            const list = getList();
            const target = e.target.closest('.ps-row');
            if (!target || target === dragging || target.dataset.pageDraggable !== '1') return;
            e.preventDefault();
            const rect = target.getBoundingClientRect();
            if (e.clientY < rect.top + rect.height / 2) {
                list.insertBefore(dragging, target);
            } else {
                list.insertBefore(dragging, target.nextSibling);
            }
        });

        // スマホ: touch drag（ハンドルから）
        container.addEventListener('touchstart', e => {
            if (!e.target.closest('.ps-handle')) return;
            const row = e.target.closest('.ps-row');
            if (!row || row.dataset.pageDraggable !== '1') return;
            dragging = row;
            e.preventDefault();
            row.classList.add('ps-dragging');
        }, { passive: false });
        container.addEventListener('touchmove', e => {
            if (!dragging) return;
            e.preventDefault();
            const list = getList();
            const t = e.touches[0];
            dragging.style.visibility = 'hidden';
            const el = document.elementFromPoint(t.clientX, t.clientY);
            dragging.style.visibility = '';
            if (!el) return;
            const target = el.closest('.ps-row');
            if (!target || target === dragging || target.dataset.pageDraggable !== '1' || !list.contains(target)) return;
            const rect = target.getBoundingClientRect();
            if (t.clientY < rect.top + rect.height / 2) {
                list.insertBefore(dragging, target);
            } else {
                list.insertBefore(dragging, target.nextSibling);
            }
        }, { passive: false });
        container.addEventListener('touchend', () => {
            if (!dragging) return;
            dragging.classList.remove('ps-dragging');
            dragging = null;
            persistPageOrder();
            renderSwitcher();
        });
        container.addEventListener('touchcancel', () => {
            if (!dragging) return;
            dragging.classList.remove('ps-dragging');
            dragging = null;
        });
    }

    // 新しい行の HTML を生成して返す
    function createRow() {
        const row = document.createElement('div');
        row.className = 'row';
        row.draggable = false;
        row.innerHTML = '<button type="button" class="row-del-btn">D</button>'
                      + '<span class="drag-handle">⠿</span>'
                      + '<div class="left">予定<input type="checkbox"> 作業<input type="checkbox"> 終了<input type="checkbox"> 確認<input type="checkbox"></div>'
                      + '<div class="right"><input type="text" class="memo" placeholder="メモ"></div>';
        return row;
    }

    // メモ文字列から最初の http/https/file URL を取り出す（なければ null）
    function urlInText(t) {
        const m = (t || '').match(/(?:https?|file):\/\/[^\s　]+/i);
        return m ? m[0] : null;
    }
    // メモ欄の右の [opn] ボタンを現在の値に合わせて表示/更新/削除
    function syncOpenBtn(input) {
        const right = input.closest('.right');
        if (!right) return;
        let btn = right.querySelector('.memo-open');
        const url = urlInText(input.value);
        if (url) {
            if (!btn) {
                btn = document.createElement('a');
                btn.className = 'memo-open';
                btn.textContent = 'opn';
                btn.target = '_blank';
                btn.rel = 'noopener noreferrer';
                btn.dataset.tip = 'リンクを開く';
                right.appendChild(btn);
            }
            btn.href = url;
        } else if (btn) {
            btn.remove();
        }
    }

    // 行内の要素にイベントを登録
    function bindRow(row) {
        row.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.addEventListener('change', saveAll));
        row.querySelectorAll('.memo').forEach(m => m.addEventListener('input', saveAll));
        // メモ欄の入力に応じて opn ボタンを同期
        row.querySelectorAll('.right .memo').forEach(m => {
            m.addEventListener('input', () => syncOpenBtn(m));
            syncOpenBtn(m);
        });
        const delBtn = row.querySelector('.row-del-btn');
        if (delBtn) delBtn.addEventListener('click', () => {
            const rows = dynamicRows.querySelectorAll('.row');
            if (rows.length <= 1) return;
            const hasText = Array.from(row.querySelectorAll('.memo')).some(m => m.value.trim() !== '');
            if (hasText && !confirm('この行にメモがあります。削除しますか？')) return;
            row.remove();
            saveAll();
        });
    }

    // --- ドラッグ並び替え（PC: mouse / スマホ: touch 両対応）---
    function initDragSort(container) {
        let dragging = null;

        // PC: mouse drag（ハンドル mousedown 時だけ draggable をオン）
        container.addEventListener('mousedown', e => {
            const handle = e.target.closest('.drag-handle');
            if (!handle) return;
            const row = handle.closest('.row');
            if (row) row.draggable = true;
        });
        container.addEventListener('dragstart', e => {
            dragging = e.target.closest('.row');
            if (!dragging) return;
            e.dataTransfer.effectAllowed = 'move';
            setTimeout(() => dragging.classList.add('dragging'), 0);
        });
        container.addEventListener('dragend', () => {
            if (dragging) { dragging.classList.remove('dragging'); dragging.draggable = false; }
            dragging = null;
            saveAll();
        });
        container.addEventListener('dragover', e => {
            e.preventDefault();
            if (!dragging) return;
            const target = e.target.closest('.row');
            if (!target || target === dragging) return;
            const rect = target.getBoundingClientRect();
            if (e.clientY < rect.top + rect.height / 2) {
                container.insertBefore(dragging, target);
            } else {
                container.insertBefore(dragging, target.nextSibling);
            }
        });

        // スマホ: touch drag（ハンドルを長押し→スワイプで並び替え）
        container.addEventListener('touchstart', e => {
            if (!e.target.closest('.drag-handle')) return;
            dragging = e.target.closest('.row');
            if (!dragging) return;
            e.preventDefault();
            dragging.classList.add('dragging');
        }, { passive: false });

        container.addEventListener('touchmove', e => {
            if (!dragging) return;
            e.preventDefault();
            const touch = e.touches[0];
            dragging.style.visibility = 'hidden';
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            dragging.style.visibility = '';
            if (!el) return;
            const target = el.closest('.row');
            if (!target || target === dragging || !container.contains(target)) return;
            const rect = target.getBoundingClientRect();
            if (touch.clientY < rect.top + rect.height / 2) {
                container.insertBefore(dragging, target);
            } else {
                container.insertBefore(dragging, target.nextSibling);
            }
        }, { passive: false });

        container.addEventListener('touchend', () => {
            if (!dragging) return;
            dragging.classList.remove('dragging');
            dragging = null;
            saveAll();
        });

        container.addEventListener('touchcancel', () => {
            if (!dragging) return;
            dragging.classList.remove('dragging');
            dragging = null;
        });
    }

    // --- 設定ダイアログ（ページタイトル）---
    const K_TITLE = 'fs02_title';
    const overlay = document.getElementById('ps-settings-overlay');
    const titleInput = document.getElementById('ps-page-title');

    const deviceNameInput  = document.getElementById('ps-device-name');
    const intervalInput    = document.getElementById('ps-sync-interval');
    const autoSyncToggle   = document.getElementById('ps-auto-sync-enabled');
    const syncNowBtn       = document.getElementById('ps-sync-now');
    const mergeReadBtn     = document.getElementById('ps-merge-read');
    const pickFileBtn      = document.getElementById('ps-pick-file');
    const forceWriteBtn    = document.getElementById('ps-force-write');
    const forceReadBtn     = document.getElementById('ps-force-read');

    function applyTitle(t) { if (t) document.title = t; }
    function openSettings() {
        titleInput.value = localStorage.getItem(K_TITLE) || document.title || '';
        deviceNameInput.value = getDevice().name || '';
        intervalInput.value = getIntervalMin();
        autoSyncToggle.checked = isAutoSyncEnabled();
        pickFileBtn.style.display = canFSA ? '' : 'none';  // Mac のみファイル指定を表示
        updateSyncStatus();
        overlay.classList.add('open');
        overlay.setAttribute('aria-hidden', 'false');
        setTimeout(() => titleInput.focus(), 60);
    }
    function closeSettings() {
        overlay.classList.remove('open');
        overlay.setAttribute('aria-hidden', 'true');
    }
    function saveSettings() {
        const v = titleInput.value.trim();
        localStorage.setItem(K_TITLE, v);
        applyTitle(v || 'MEMO SAVE IN LOCALSTORAGE');
        setDeviceName(deviceNameInput.value);
        const iv = parseInt(intervalInput.value, 10);
        if (iv && iv > 0) localStorage.setItem(K_INTERVAL, iv);
        localStorage.setItem(K_AUTO_SYNC, autoSyncToggle.checked ? '1' : '0');
        armSyncTimer();
        renderSwitcher();
        closeSettings();
    }
    document.getElementById('ps-settings-close').addEventListener('click', closeSettings);
    document.getElementById('ps-settings-save').addEventListener('click', saveSettings);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeSettings(); });
    titleInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter')       { e.preventDefault(); saveSettings(); }
        else if (e.key === 'Escape') { closeSettings(); }
    });

    // 同期する（読込→マージ→反映→書き出し）
    syncNowBtn.addEventListener('click', async () => {
        const orig = syncNowBtn.textContent;
        const statusEl = document.getElementById('ps-sync-status');
        syncNowBtn.disabled = true; syncNowBtn.textContent = '同期中…';
        if (statusEl) statusEl.textContent = '同期中…';
        try {
            const n = await syncNow();
            await refreshSilentPermission();
            if (statusEl) statusEl.textContent = (n ? ('取り込み＆書き出し完了（' + n + 'ページ）・') : '書き出し完了・') +
                                                 (relTime(localStorage.getItem(K_LASTSYNC)) || 'たった今');
        } catch (e) {
            if (statusEl) statusEl.textContent = '同期に失敗: ' + (e && e.message ? e.message : e);
        } finally {
            syncNowBtn.disabled = false; syncNowBtn.textContent = orig;
        }
    });
    // 同期ファイルを選び直す（Mac のみ）：iCloud上の既存ファイルを開いて即同期
    pickFileBtn.addEventListener('click', async () => {
        const statusEl = document.getElementById('ps-sync-status');
        try {
            await openExistingFile();
            await refreshSilentPermission();
            const n = await syncNow();
            if (statusEl) statusEl.textContent = '指定ファイルと同期しました（' + n + 'ページ取り込み）';
        } catch (e) { /* キャンセル等は無視 */ updateSyncStatus(); }
    });

    // 強制書出（この端末でファイルを上書き・読込なし）
    forceWriteBtn.addEventListener('click', async () => {
        if (!confirm('【強制書出】この端末の内容でファイルを上書きします。\nファイル側にしかないメモ（他端末の未取り込み分）は消えます。\n\n実行しますか？')) return;
        const statusEl = document.getElementById('ps-sync-status');
        const o = forceWriteBtn.textContent;
        forceWriteBtn.disabled = true; forceWriteBtn.textContent = '書込中…';
        try {
            await forceWrite();
            await refreshSilentPermission();
            if (statusEl) statusEl.textContent = '強制書出しました・' + (relTime(localStorage.getItem(K_LASTSYNC)) || 'たった今');
        } catch (e) {
            if (statusEl) statusEl.textContent = '強制書出に失敗: ' + (e && e.message ? e.message : e);
        } finally {
            forceWriteBtn.disabled = false; forceWriteBtn.textContent = o;
        }
    });

    // 強制読込（ファイルでこの端末を上書き・マージなし）
    forceReadBtn.addEventListener('click', async () => {
        if (!confirm('【強制読込】ファイルの内容でこの端末を上書きします。\nこの端末だけにあるメモは消えます。\n\n実行しますか？')) return;
        const statusEl = document.getElementById('ps-sync-status');
        const o = forceReadBtn.textContent;
        forceReadBtn.disabled = true; forceReadBtn.textContent = '読込中…';
        try {
            const n = await forceRead();
            await refreshSilentPermission();
            if (statusEl) statusEl.textContent = '強制読込しました（' + n + 'ページ採用）';
        } catch (e) {
            if (statusEl) statusEl.textContent = '強制読込に失敗: ' + (e && e.message ? e.message : e);
        } finally {
            forceReadBtn.disabled = false; forceReadBtn.textContent = o;
        }
    });

    // マージ読込（ファイルを選んで読み込み・この端末とマージ・書き出しなし）
    mergeReadBtn.addEventListener('click', async () => {
        if (!confirm('【マージ読込】ファイルを選んで読み込み、この端末とマージします。\n両方のメモが残ります（ファイルへの書き出しはしません）。\n\n実行しますか？')) return;
        const statusEl = document.getElementById('ps-sync-status');
        const o = mergeReadBtn.textContent;
        mergeReadBtn.disabled = true; mergeReadBtn.textContent = '読込中…';
        try {
            const n = await forceMergeRead();
            await refreshSilentPermission();
            if (statusEl) statusEl.textContent = 'マージ読込しました（' + n + 'ページ取り込み）';
        } catch (e) {
            if (statusEl) statusEl.textContent = 'マージ読込に失敗: ' + (e && e.message ? e.message : e);
        } finally {
            mergeReadBtn.disabled = false; mergeReadBtn.textContent = o;
        }
    });

    applyTitle(localStorage.getItem(K_TITLE)); // 保存済みタイトルを適用

    // --- 起動 ---
    // フォーム下部のメモ（textarea 等、#dynamic-rows 外）の入力を保存（一度だけ登録）
    form.querySelectorAll('.memo').forEach(m => {
        if (!m.closest('#dynamic-rows')) m.addEventListener('input', saveAll);
    });

    initDragSort(dynamicRows);   // 行ドラッグ：コンテナへ一度だけ委譲登録
    initPanelDragSort(switcher); // ページ並び替え：パネルへ一度だけ委譲登録
    initPages();                 // ページ初期化・旧データ移行
    loadPage(getActive());       // アクティブページを描画
    renderSwitcher();            // フロートUI描画

    // --- ページ下部タイトルバー（CLA / 日付 / タイトル）---
    const ptbTitle = document.getElementById('ptb-title');
    const ptbDate  = document.getElementById('ptb-date');
    const ptbClear = document.getElementById('ptb-clear');

    ptbTitle.addEventListener('input', () => {
        const list = getPages();
        const t = list.find(x => x.id === getActive());
        if (t) { t.name = ptbTitle.value; setPages(list); renderSwitcher(); }
    });
    ptbDate.addEventListener('input', () => {
        localStorage.setItem(pk(getActive(),'date'), ptbDate.value);
    });
    ptbClear.addEventListener('click', () => {
        if (!confirm('このページのメモ内容をすべてクリアしますか？\nタイトルと日付は残ります。')) return;
        form.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        form.querySelectorAll('.memo').forEach(m => m.value = '');
        dynamicRows.querySelectorAll('.right .memo').forEach(m => syncOpenBtn(m));
        saveAll();
    });

    // --- カスタムツールチップ（data-tip 属性・JS委譲）---
    const tip = document.getElementById('tip');
    let tipTarget = null;

    function positionTipByPanel(el) {
        requestAnimationFrame(() => {
            const panel = document.getElementById('page-switcher');
            const pr = panel.getBoundingClientRect();
            const tw = tip.offsetWidth, th = tip.offsetHeight;
            // スマホ：UI（パネル）のすぐ真上に2px離して表示（右端揃え・画面外clamp）
            if (window.innerWidth <= 640) {
                const x = pr.right - tw;
                const y = pr.top - th - 2;
                tip.style.left = Math.max(8, Math.min(window.innerWidth - tw - 8, x)) + 'px';
                tip.style.top  = Math.max(8, y) + 'px';
                return;
            }
            // PC：パネルの左側に表示
            const tr = el.getBoundingClientRect();
            const x = pr.left - tw - 2;
            const y = tr.top + (tr.height - th) / 2;
            tip.style.left = Math.max(8, x) + 'px';
            tip.style.top  = Math.max(8, Math.min(window.innerHeight - th - 8, y)) + 'px';
        });
    }

    document.addEventListener('mouseover', e => {
        const el = e.target.closest('[data-tip]');
        if (!el) { tip.classList.remove('visible'); tipTarget = null; return; }
        if (el === tipTarget) return;
        tipTarget = el;
        tip.textContent = el.dataset.tip;
        tip.classList.add('visible');
        if (el.closest('#page-switcher')) positionTipByPanel(el);
    });
    document.addEventListener('mousemove', e => {
        if (!tipTarget) return;
        if (tipTarget.closest('#page-switcher')) return;   // パネル内は固定（追従しない）
        // 再描画でtipTargetがDOMから外れた場合は追従させず隠す（位置ズレ防止）
        if (!document.body.contains(tipTarget)) {
            tip.classList.remove('visible');
            tipTarget = null;
            return;
        }
        const vw = window.innerWidth, vh = window.innerHeight;
        let x = e.clientX + 12, y = e.clientY - 30;
        const tw = tip.offsetWidth, th = tip.offsetHeight;
        if (x + tw > vw - 8) x = e.clientX - tw - 12;
        if (y < 8) y = e.clientY + 16;
        if (y + th > vh - 8) y = e.clientY - th - 8;
        tip.style.left = x + 'px';
        tip.style.top  = y + 'px';
    });
    document.addEventListener('mouseout', e => {
        const el = e.target.closest('[data-tip]');
        if (!el) return;
        if (!el.contains(e.relatedTarget)) {
            tip.classList.remove('visible');
            tipTarget = null;
        }
    });

    // --- ＋ボタン（行を追加）---
    document.getElementById('btn-add-row').addEventListener('click', function(e) {
        e.preventDefault();
        const row = createRow();
        dynamicRows.appendChild(row);
        bindRow(row);
        saveAll();
    });

    // --- －ボタン（行を削除）---
    document.getElementById('btn-remove-row').addEventListener('click', function(e) {
        e.preventDefault();
        const rows = dynamicRows.querySelectorAll('.row');
        if (rows.length <= 1) return;
        const last = rows[rows.length - 1];
        const hasText = Array.from(last.querySelectorAll('.memo')).some(m => m.value.trim() !== '');
        if (hasText && !confirm('この行にメモがあります。削除しますか？')) return;
        last.remove();
        saveAll();
    });

    // --- 同期の起動配線 ---
    getDevice();                 // 端末レコードを確実に用意（初回はUUID＋種別推測）
    (async () => {
        await restoreHandle();           // 前回指定したファイルハンドルを復元（Mac）
        await refreshSilentPermission(); // 無操作で書ける状態か把握（自動同期の判定用）
        armSyncTimer();                  // 自動同期タイマー（Macのみ）
        updateSyncStatus();
        // 前回の変更が未同期のまま残っている場合のみ通知（同期を使っている人だけ）
        if (isDirty() && syncConfigured()) {
            setTimeout(() => {
                if (confirm('前回の変更が未同期です。今すぐ同期しますか？')) {
                    syncNow().then(refreshSilentPermission).catch(() => {});
                }
            }, 400);
        }
    })();

    // 画面が隠れる時：Mac かつ無操作で書ける場合のみ自動上書き（タブ切替・閉じる前に有効）
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState !== 'hidden') return;
        if (!isDirty() || !canFSA || !fsHandle || !handlePermittedSilently) return;
        // ベストエフォート（完了保証はしない）。失敗時は beforeunload の警告で担保
        try { writeHandle(fsHandle, exportData()).then(markSynced).catch(() => {}); } catch (e) {}
    });

    // 閉じる時：未同期の変更があれば警告（全端末で確実に動く担保）
    window.addEventListener('beforeunload', (e) => {
        if (!isDirty()) return;
        e.preventDefault();
        e.returnValue = '';   // 標準の「変更が保存されない可能性」警告を表示
        return '';
    });

});
</script>

</body>
</html>
